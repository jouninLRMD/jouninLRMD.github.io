name: Update publications

on:
  # Run daily at 05:17 UTC (staggered off the hour to be polite to APIs).
  schedule:
    - cron: "17 5 * * *"
  # Manual kick-off from the Actions tab.
  workflow_dispatch:
  # Rebuild whenever curation files or the script itself change.
  push:
    branches: [main]
    paths:
      - "scripts/update_publications.py"
      - "data/config.json"
      - ".github/workflows/update-publications.yml"

permissions:
  contents: write

concurrency:
  group: update-publications
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Fetch latest publications
        env:
          CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL || 'lrmercadod@gmail.com' }}
        run: python scripts/update_publications.py

      - name: Commit & push (only if changed)
        run: |
          set -euo pipefail
          if git diff --quiet -- data/publications.json; then
            echo "No changes to publications.json; nothing to commit."
            exit 0
          fi
          # Attribute automated refreshes to Luis so the repo history is
          # consistent with manual commits.
          git config user.name  "Luís Roberto Mercado Díaz"
          git config user.email "lrmercadod@gmail.com"
          git add data/publications.json
          git commit -m "chore(data): refresh publications from OpenAlex/CrossRef"
          git push
